[package]
name = "hunk-desktop"
version = "0.1.0"
edition = "2024"

[package.metadata.bundle]
name = "Hunk"
identifier = "com.prodata.hunk"
short_description = "Fast Git diff viewer."
long_description = "A fast, simple Git diff viewer built with GPUI."
category = "public.app-category.developer-tools"
icon = ["assets/icons/Hunk.icns"]
resources = ["../../assets/codex-runtime"]

[dependencies]
anyhow = "1.0"
ctrlc = "3.5"
dirs = "6.0"
futures = "0.3"
gpui = { git = "https://github.com/zed-industries/zed" }
gpui_platform = { git = "https://github.com/zed-industries/zed", features = [
  "font-kit",
  "x11",
  "wayland",
  "runtime_shaders",
] }
gpui-component = { git = "https://github.com/longbridge/gpui-component", features = [
  "tree-sitter-languages",
] }
gpui-component-assets = { git = "https://github.com/longbridge/gpui-component" }
notify = "8.2.0"
syntect = "5.3"
toml = "0.9"
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
time = { version = "0.3", features = ["formatting", "local-offset"] }
hunk-domain = { path = "../hunk-domain" }
hunk-git = { path = "../hunk-git" }
hunk-codex = { path = "../hunk-codex" }
codex-app-server-protocol = { git = "https://github.com/openai/codex.git", tag = "rust-v0.113.0-alpha.2" }
codex-protocol = { git = "https://github.com/openai/codex.git", tag = "rust-v0.113.0-alpha.2" }

[dev-dependencies]
git2 = { version = "0.20", features = ["https", "ssh"] }
