app-id: io.github.BlixtWallet.Hunk
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: hunk_desktop
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=ssh-auth
  - --device=dri
  - --filesystem=host
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/hunk-flatpak/cargo
    CARGO_INCREMENTAL: "0"
    CARGO_NET_OFFLINE: "true"
    CARGO_TARGET_DIR: /run/build/hunk-flatpak/target
    RUSTUP_HOME: /usr/lib/sdk/rust-stable
modules:
  - name: hunk
    buildsystem: simple
    build-commands:
      - test -f flatpak/cargo-config.toml || (echo "missing flatpak/cargo-config.toml; run ./scripts/prepare_flatpak_vendor.sh first" >&2 && exit 1)
      - test -x assets/codex-runtime/linux/codex || (echo "missing assets/codex-runtime/linux/codex; run ./scripts/download_codex_runtime_unix.sh linux first" >&2 && exit 1)
      - mkdir -p .cargo
      - cp flatpak/cargo-config.toml .cargo/config.toml
      - cargo build --offline --frozen --release -p hunk-desktop
      - install -Dm755 /run/build/hunk-flatpak/target/release/hunk_desktop /app/bin/hunk_desktop
      - install -Dm755 assets/codex-runtime/linux/codex /app/bin/codex-runtime/linux/codex
      - install -Dm644 flatpak/io.github.BlixtWallet.Hunk.desktop /app/share/applications/io.github.BlixtWallet.Hunk.desktop
      - install -Dm644 flatpak/io.github.BlixtWallet.Hunk.metainfo.xml /app/share/metainfo/io.github.BlixtWallet.Hunk.metainfo.xml
      - install -Dm644 assets/icons/hunk_new.png /app/share/icons/hicolor/1024x1024/apps/io.github.BlixtWallet.Hunk.png
    sources:
      - type: dir
        path: ..
