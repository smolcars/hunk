name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  macos:
    name: macOS ARM64 DMG
    runs-on: macos-26
    timeout-minutes: 90
    env:
      APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_NOTARY_API_KEY_BASE64: ${{ secrets.APPLE_NOTARY_API_KEY_BASE64 }}
      APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
      APPLE_NOTARY_ISSUER: ${{ secrets.APPLE_NOTARY_ISSUER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Install Determinate Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Install cargo-packager
        run: nix develop --accept-flake-config -c cargo install cargo-packager --locked --version 0.11.8
        shell: bash

      - name: Resolve release version
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "push" && "${GITHUB_REF_TYPE:-}" == "tag" && "$GITHUB_REF_NAME" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(./scripts/resolve_hunk_version.sh)"
          fi
          echo "HUNK_RELEASE_VERSION=$version" >> "$GITHUB_ENV"
        shell: bash

      - name: Detect Apple signing configuration
        run: |
          if [[ -n "${APPLE_CERTIFICATE_P12_BASE64:-}" \
             && -n "${APPLE_CERTIFICATE_PASSWORD:-}" \
             && -n "${APPLE_SIGNING_IDENTITY:-}" \
             && -n "${APPLE_NOTARY_API_KEY_BASE64:-}" \
             && -n "${APPLE_NOTARY_KEY_ID:-}" \
             && -n "${APPLE_NOTARY_ISSUER:-}" ]]; then
            echo "MACOS_SIGNING_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "MACOS_SIGNING_ENABLED=false" >> "$GITHUB_ENV"
            echo "Apple signing secrets unavailable; packaging unsigned macOS artifact for workflow validation." >&2
          fi
        shell: bash

      - name: Assert Apple signing secrets are configured
        if: env.MACOS_SIGNING_ENABLED == 'true'
        run: |
          : "${APPLE_CERTIFICATE_P12_BASE64:?missing APPLE_CERTIFICATE_P12_BASE64}"
          : "${APPLE_CERTIFICATE_PASSWORD:?missing APPLE_CERTIFICATE_PASSWORD}"
          : "${APPLE_SIGNING_IDENTITY:?missing APPLE_SIGNING_IDENTITY}"
          : "${APPLE_NOTARY_API_KEY_BASE64:?missing APPLE_NOTARY_API_KEY_BASE64}"
          : "${APPLE_NOTARY_KEY_ID:?missing APPLE_NOTARY_KEY_ID}"
          : "${APPLE_NOTARY_ISSUER:?missing APPLE_NOTARY_ISSUER}"
        shell: bash

      - name: Import Apple signing certificate
        if: env.MACOS_SIGNING_ENABLED == 'true'
        run: |
          KEYCHAIN_PASSWORD="$RUNNER_TEMP/hunk-release-keychain"
          CERT_PATH="$RUNNER_TEMP/hunk-signing-cert.p12"
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import "$CERT_PATH" -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
        shell: bash

      - name: Prepare Apple notary API key
        if: env.MACOS_SIGNING_ENABLED == 'true'
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          echo "$APPLE_NOTARY_API_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_NOTARY_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
        shell: bash

      - name: Package macOS release artifact
        id: package
        run: |
          artifact_path="$(nix develop --accept-flake-config -c ./scripts/package_macos_release.sh | tail -n 1)"
          echo "artifact_path=$artifact_path" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Create macOS OTA tarball
        run: |
          ota_path="target/dist/Hunk-${HUNK_RELEASE_VERSION}-macos-arm64.app.tar.gz"
          rm -f "$ota_path"
          tar -C target/packager/macos -czf "$ota_path" Hunk.app
        shell: bash

      - name: Upload macOS release artifact
        uses: actions/upload-artifact@v7
        with:
          name: hunk-macos-arm64-dmg
          path: ${{ steps.package.outputs.artifact_path }}
          if-no-files-found: error

      - name: Upload macOS OTA tarball artifact
        uses: actions/upload-artifact@v7
        with:
          name: hunk-macos-arm64-app-tarball
          path: target/dist/Hunk-${{ env.HUNK_RELEASE_VERSION }}-macos-arm64.app.tar.gz
          if-no-files-found: error

  linux:
    name: Linux x86_64 Tarball, DEB, RPM
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          use-cache: false
          version: 0.15.2

      - name: Cache cargo registry and Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ runner.os }}-desktop-v2
          workspaces: |
            . -> target
          cache-on-failure: "true"

      - name: Resolve release version
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "push" && "${GITHUB_REF_TYPE:-}" == "tag" && "$GITHUB_REF_NAME" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(./scripts/resolve_hunk_version.sh)"
          fi
          echo "HUNK_RELEASE_VERSION=$version" >> "$GITHUB_ENV"
        shell: bash

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libasound2-dev \
            libcap-dev \
            libdbus-1-dev \
            libegl1 \
            libffi-dev \
            libfontconfig-dev \
            libgit2-dev \
            libglib2.0-dev \
            libssl-dev \
            libvulkan1 \
            libwayland-client0 \
            libwayland-cursor0 \
            libwayland-dev \
            libwayland-egl1 \
            libx11-dev \
            libx11-xcb-dev \
            libxkbcommon-x11-dev \
            libzstd-dev \
            patchelf \
            pkg-config \
            rpm
        shell: bash

      - name: Package Linux release artifacts
        run: ./scripts/package_linux_release_zed_like.sh --formats tarball,deb,rpm
        shell: bash

      - name: Upload Linux tarball release artifact
        uses: actions/upload-artifact@v7
        with:
          name: hunk-linux-x86_64-tarball
          path: target/dist/Hunk-${{ env.HUNK_RELEASE_VERSION }}-linux-x86_64.tar.gz
          if-no-files-found: error

      - name: Upload Linux Debian release artifact
        uses: actions/upload-artifact@v7
        with:
          name: hunk-linux-x86_64-deb
          path: target/dist/hunk-desktop_${{ env.HUNK_RELEASE_VERSION }}-1_amd64.deb
          if-no-files-found: error

      - name: Upload Linux RPM release artifact
        uses: actions/upload-artifact@v7
        with:
          name: hunk-linux-x86_64-rpm
          path: target/dist/*.rpm
          if-no-files-found: error

  windows:
    name: Windows x86_64 MSI
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          use-cache: false
          version: 0.15.2

      - name: Cache cargo registry and Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ runner.os }}-desktop-v2
          workspaces: |
            . -> target
          cache-on-failure: "true"

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked --version 0.11.8
        shell: pwsh

      - name: Resolve release version
        run: |
          if ($env:GITHUB_EVENT_NAME -eq "push" -and $env:GITHUB_REF_TYPE -eq "tag" -and $env:GITHUB_REF_NAME.StartsWith("v")) {
              $version = $env:GITHUB_REF_NAME.TrimStart('v')
          } else {
              $version = (bash ./scripts/resolve_hunk_version.sh).Trim()
          }
          "HUNK_RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: pwsh

      - name: Package Windows release artifact
        id: package
        run: |
          $artifactPath = (pwsh ./scripts/package_windows_release.ps1 | Select-Object -Last 1).Trim()
          "artifact_path=$artifactPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        shell: pwsh

      - name: Upload Windows release artifact
        uses: actions/upload-artifact@v7
        with:
          name: hunk-windows-x86_64-msi
          path: ${{ steps.package.outputs.artifact_path }}
          if-no-files-found: error

  publish:
    name: Prepare Release Artifacts
    needs:
      - macos
      - linux
      - windows
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      HUNK_UPDATE_PRIVATE_KEY_BASE64: ${{ secrets.HUNK_UPDATE_PRIVATE_KEY_BASE64 }}
      HUNK_UPDATE_MANIFEST_R2_ACCESS_KEY_ID: ${{ secrets.HUNK_UPDATE_MANIFEST_R2_ACCESS_KEY_ID }}
      HUNK_UPDATE_MANIFEST_R2_SECRET_ACCESS_KEY: ${{ secrets.HUNK_UPDATE_MANIFEST_R2_SECRET_ACCESS_KEY }}
      HUNK_UPDATE_MANIFEST_R2_S3_API_URL: ${{ secrets.HUNK_UPDATE_MANIFEST_R2_S3_API_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install AWS CLI when missing
        run: |
          if command -v aws >/dev/null 2>&1; then
            aws --version
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y awscli
        shell: bash

      - name: Resolve release version
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "push" && "${GITHUB_REF_TYPE:-}" == "tag" && "$GITHUB_REF_NAME" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(./scripts/resolve_hunk_version.sh)"
          fi
          echo "HUNK_RELEASE_VERSION=$version" >> "$GITHUB_ENV"
        shell: bash

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Generate updater manifest and detached signatures
        if: env.HUNK_UPDATE_PRIVATE_KEY_BASE64 != ''
        run: |
          base_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          pub_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          macos_ota_path="$(find dist/hunk-macos-arm64-app-tarball -type f -name "Hunk-${HUNK_RELEASE_VERSION}-macos-arm64.app.tar.gz" | head -n 1)"
          windows_msi_path="$(find dist/hunk-windows-x86_64-msi -type f -name '*.msi' | head -n 1)"
          linux_tarball_path="$(find dist/hunk-linux-x86_64-tarball -type f -name "Hunk-${HUNK_RELEASE_VERSION}-linux-x86_64.tar.gz" | head -n 1)"

          : "${macos_ota_path:?missing macOS OTA tarball artifact}"
          : "${windows_msi_path:?missing Windows MSI artifact}"
          : "${linux_tarball_path:?missing Linux tarball artifact}"

          cargo run -p hunk-updater --bin hunk-update-manifest -- \
            --version "$HUNK_RELEASE_VERSION" \
            --base-url "$base_url" \
            --private-key-base64 "$HUNK_UPDATE_PRIVATE_KEY_BASE64" \
            --output-dir dist/update-manifest \
            --pub-date "$pub_date" \
            --asset "macos-aarch64:app:$macos_ota_path" \
            --asset "windows-x86_64:wix:$windows_msi_path" \
            --asset "linux-x86_64:tarball:$linux_tarball_path"
        shell: bash

      - name: Skip updater manifest generation when signing key is unavailable
        if: env.HUNK_UPDATE_PRIVATE_KEY_BASE64 == ''
        run: |
          echo "Updater signing key is not configured; skipping stable.json and detached signature generation." >&2
        shell: bash

      - name: Generate SHA256SUMS
        run: |
          cd dist
          find . -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
        shell: bash

      - name: Upload updater manifest bundle artifact
        if: env.HUNK_UPDATE_PRIVATE_KEY_BASE64 != ''
        uses: actions/upload-artifact@v7
        with:
          name: hunk-update-manifest
          path: dist/update-manifest
          if-no-files-found: error

      - name: Publish updater manifest to Cloudflare R2
        if: env.HUNK_UPDATE_PRIVATE_KEY_BASE64 != '' && env.HUNK_UPDATE_MANIFEST_R2_ACCESS_KEY_ID != '' && env.HUNK_UPDATE_MANIFEST_R2_SECRET_ACCESS_KEY != '' && env.HUNK_UPDATE_MANIFEST_R2_S3_API_URL != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ env.HUNK_UPDATE_MANIFEST_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.HUNK_UPDATE_MANIFEST_R2_SECRET_ACCESS_KEY }}
          AWS_EC2_METADATA_DISABLED: "true"
          AWS_DEFAULT_REGION: "auto"
        run: |
          s3_url="${HUNK_UPDATE_MANIFEST_R2_S3_API_URL}"
          endpoint_url="${s3_url%/*}"
          bucket_name="${s3_url##*/}"

          if [[ -z "$endpoint_url" || -z "$bucket_name" || "$endpoint_url" == "$s3_url" ]]; then
            echo "error: invalid HUNK_UPDATE_MANIFEST_R2_S3_API_URL: $s3_url" >&2
            exit 1
          fi

          aws --endpoint-url "$endpoint_url" s3 cp dist/update-manifest/stable.json "s3://$bucket_name/stable.json" \
            --content-type application/json \
            --cache-control "no-cache, no-store, must-revalidate"
          aws --endpoint-url "$endpoint_url" s3 cp dist/update-manifest/stable.json.sig "s3://$bucket_name/stable.json.sig" \
            --content-type "text/plain; charset=utf-8" \
            --cache-control "no-cache, no-store, must-revalidate"
        shell: bash

      - name: Skip Cloudflare R2 manifest publish when bucket credentials are unavailable
        if: env.HUNK_UPDATE_PRIVATE_KEY_BASE64 != '' && (env.HUNK_UPDATE_MANIFEST_R2_ACCESS_KEY_ID == '' || env.HUNK_UPDATE_MANIFEST_R2_SECRET_ACCESS_KEY == '' || env.HUNK_UPDATE_MANIFEST_R2_S3_API_URL == '')
        run: |
          echo "Cloudflare R2 manifest publishing is not configured; skipping stable.json upload." >&2
        shell: bash

      - name: List prepared release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -d '' files < <(find dist -type f -print0 | sort -z)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "error: no release artifacts were downloaded" >&2
            exit 1
          fi

          release_args=(--repo "$GITHUB_REPOSITORY" --title "$GITHUB_REF_NAME" --generate-notes)

          if ! gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" "${release_args[@]}"
          fi

          gh release upload "$GITHUB_REF_NAME" "${files[@]}" --repo "$GITHUB_REPOSITORY" --clobber

          printf 'Prepared release artifacts:\n'
          printf ' - %s\n' "${files[@]}"
        shell: bash
