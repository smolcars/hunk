name: CI

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    paths:
      - ".github/workflows/**"
      - ".cargo/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "justfile"
      - "crates/**"
      - "scripts/**"
      - "assets/icons/**"
      - "README.md"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  linux:
    name: Linux Checks
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          use-cache: false
          version: 0.15.2

      - name: Cache cargo registry and Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: pr-build-${{ runner.os }}-desktop
          workspaces: |
            . -> target
          cache-on-failure: "true"

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libasound2-dev \
            libcap-dev \
            libdbus-1-dev \
            libegl1 \
            libffi-dev \
            libfontconfig-dev \
            libgit2-dev \
            libglib2.0-dev \
            libssl-dev \
            libvulkan1 \
            libwayland-client0 \
            libwayland-cursor0 \
            libwayland-dev \
            libwayland-egl1 \
            libx11-dev \
            libx11-xcb-dev \
            libxkbcommon-x11-dev \
            libzstd-dev \
            patchelf \
            pkg-config \
            rpm
        shell: bash

      # Temporarily disabled for PR builds; release packaging stays in release workflows.
      # - name: Resolve release version
      #   run: |
      #     version="$(./scripts/resolve_hunk_version.sh)"
      #     echo "HUNK_RELEASE_VERSION=$version" >> "$GITHUB_ENV"
      #   shell: bash

      - name: Check formatting
        run: cargo fmt --all --check
        shell: bash

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        shell: bash

      - name: Run tests
        run: cargo test --workspace
        shell: bash

      - name: Build hunk-desktop
        run: cargo build -p hunk-desktop --locked
        shell: bash

      # Temporarily disabled for PR builds; release packaging stays in release workflows.
      # - name: Package Linux artifacts
      #   run: ./scripts/package_linux_release_zed_like.sh --formats tarball,deb,rpm
      #   shell: bash
