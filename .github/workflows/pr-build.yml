    name: ${{ matrix.name }} Build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    env:
      APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_NOTARY_API_KEY_BASE64: ${{ secrets.APPLE_NOTARY_API_KEY_BASE64 }}
      APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
      APPLE_NOTARY_ISSUER: ${{ secrets.APPLE_NOTARY_ISSUER }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            install_packager: cargo install cargo-packager --locked --version 0.11.8
            resolve_version: |
              version="$(./scripts/resolve_hunk_version.sh)"
              echo "HUNK_RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          - name: Windows
            os: windows-latest
            install_packager: cargo install cargo-packager --locked --version 0.11.8
            resolve_version: |
              $version = (bash ./scripts/resolve_hunk_version.sh).Trim()
