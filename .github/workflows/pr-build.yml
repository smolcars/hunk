      # - name: Upload Linux tarball artifact
      #   uses: actions/upload-artifact@v7
      #   with:
      #     name: hunk-linux-x86_64-tarball
      #     path: target/dist/Hunk-${{ env.HUNK_RELEASE_VERSION }}-linux-x86_64.tar.gz
      #     if-no-files-found: error
      #
      # - name: Upload Linux Debian artifact
      #   uses: actions/upload-artifact@v7
      #   with:
      #     name: hunk-linux-x86_64-deb
      #     path: target/dist/hunk-desktop_${{ env.HUNK_RELEASE_VERSION }}-1_amd64.deb
      #     if-no-files-found: error
      #
      # - name: Upload Linux RPM artifact
      #   uses: actions/upload-artifact@v7
      #   with:
      #     name: hunk-linux-x86_64-rpm
      #     path: target/dist/*.rpm
      #     if-no-files-found: error

