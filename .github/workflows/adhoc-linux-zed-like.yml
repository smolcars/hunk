name: Adhoc Linux Zed-like Packaging

on:
  workflow_dispatch:
    inputs:
      formats:
        description: "Comma-separated Linux package formats to build"
        required: false
        default: tarball
        type: string
      release_version:
        description: "Optional HUNK_RELEASE_VERSION override"
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  linux:
    name: Linux x86_64 Zed-like Bundles
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    env:
      REQUESTED_FORMATS: ${{ inputs.formats }}
      REQUESTED_RELEASE_VERSION: ${{ inputs.release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve shared cargo target dir
        run: echo "CARGO_TARGET_DIR=$(./scripts/resolve_cargo_target_dir.sh "$GITHUB_WORKSPACE")" >> "$GITHUB_ENV"
        shell: bash

      - name: Cache cargo registry and Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: adhoc-zed-like-${{ runner.os }}-desktop
          workspaces: |
            . -> target-shared
          cache-on-failure: "true"

      - name: Resolve release version
        run: |
          if [[ -n "$REQUESTED_RELEASE_VERSION" ]]; then
            version="$REQUESTED_RELEASE_VERSION"
          else
            version="$(./scripts/resolve_hunk_version.sh)"
          fi
          echo "HUNK_RELEASE_VERSION=$version" >> "$GITHUB_ENV"
        shell: bash

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libasound2-dev \
            libegl1 \
            libffi-dev \
            libfontconfig-dev \
            libgit2-dev \
            libglib2.0-dev \
            libssl-dev \
            libvulkan1 \
            libwayland-client0 \
            libwayland-cursor0 \
            libwayland-dev \
            libwayland-egl1 \
            libx11-dev \
            libx11-xcb-dev \
            libxkbcommon-x11-dev \
            libzstd-dev \
            patchelf \
            pkg-config \
            rpm
        shell: bash

      - name: Clear previous Linux packaging outputs
        run: rm -rf "$CARGO_TARGET_DIR/dist" "$CARGO_TARGET_DIR/linux-packaging"
        shell: bash

      - name: Package Linux release artifacts
        run: ./scripts/package_linux_release_zed_like.sh --formats "$REQUESTED_FORMATS"
        shell: bash

      - name: Upload Linux tarball artifact
        if: ${{ inputs.formats == 'all' || contains(format(',{0},', inputs.formats), ',tarball,') }}
        uses: actions/upload-artifact@v7
        with:
          name: hunk-linux-x86_64-zed-like-tarball
          path: ${{ env.CARGO_TARGET_DIR }}/dist/Hunk-${{ env.HUNK_RELEASE_VERSION }}-linux-x86_64.tar.gz
          if-no-files-found: error

      - name: Upload Linux Debian artifact
        if: ${{ inputs.formats == 'all' || contains(format(',{0},', inputs.formats), ',deb,') }}
        uses: actions/upload-artifact@v7
        with:
          name: hunk-linux-x86_64-zed-like-deb
          path: ${{ env.CARGO_TARGET_DIR }}/dist/hunk-desktop_${{ env.HUNK_RELEASE_VERSION }}-1_amd64.deb
          if-no-files-found: error

      - name: Upload Linux RPM artifact
        if: ${{ inputs.formats == 'all' || contains(format(',{0},', inputs.formats), ',rpm,') }}
        uses: actions/upload-artifact@v7
        with:
          name: hunk-linux-x86_64-zed-like-rpm
          path: ${{ env.CARGO_TARGET_DIR }}/dist/*.rpm
          if-no-files-found: error
